# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: engine_request_queuing
    status: active
    description: "Callers of playEngine.play() or reviewEngine.analyze() must NOT queue requests.
      Use AbortSignal to cancel the in-flight request and call analyze() with the new parameters.
      The engine wrapper itself enforces cancel-replace: a second analyze() call while THINKING
      transitions the state machine THINKING → STOPPING → IDLE → THINKING (new request)."
    why: "Queuing allows stale analyses to accumulate. In Play Mode this delivers moves for positions
      the player has already left. The GDD is explicit (Core Rule 7: 'Never queue searches').
      Freshness of result is a correctness requirement, not a performance preference."
    adr: docs/architecture/adr-0002-web-worker-isolation-and-uci-protocol.md
    added: 2026-05-28

  - pattern: engine_tsv_runtime_parse
    status: active
    description: "The chess-openings dataset must NOT be parsed from raw TSV files at browser runtime.
      The opening index must be pre-built at compile time as a TypeScript Map constant."
    why: "Runtime TSV parsing adds ~50–100ms synchronous CPU work on mobile, prevents tree-shaking,
      and violates the < 150 KB gzip bundle requirement. The build-time Map approach satisfies all
      three constraints simultaneously."
    adr: docs/architecture/adr-0003-chess-openings-dataset-pin-and-epd-index.md
    added: 2026-05-28

  - pattern: completed_game_via_event
    status: active
    description: "CompletedGame must be transported from GameLifecycle to PostGameReview/GameExport via gameStore.completedGame (Pinia shallowRef). It must NOT be transported via: Vue event payload, router.push() route state/query, window.history.state, or any other ad-hoc channel."
    why: "Route payloads are not preserved across page refreshes (user navigating back to /review) or iOS PWA relaunches. The store is the only channel that survives navigation round-trips and is readable synchronously on PostGameReview mount without an async boundary."
    adr: docs/architecture/adr-0005-pinia-store-boundaries-and-completed-game-transport.md
    added: 2026-05-28

  - pattern: abort_controller_in_vue_reactive
    status: active
    description: "AbortController instances stored in Pinia stores MUST be wrapped with markRaw(). They must NOT be passed to ref(), reactive(), or shallowRef() without markRaw. Example: const ctrl = shallowRef(markRaw(new AbortController())). When resetting, replace with a new markRaw-wrapped instance — never reuse an aborted controller."
    why: "Vue's reactive Proxy wraps the AbortSignal object. Calling .abort() on the proxy may not fire the 'abort' event on the native AbortSignal that an async function already holds a reference to — silently breaking cancellation. This is the most common Vue reactive-proxy pitfall in cancel-replace async patterns. markRaw() prevents Vue from proxying the controller."
    adr: docs/architecture/adr-0007-post-game-review-analysis-loop-and-sessionstorage-schema.md
    added: 2026-05-28

  - pattern: vue_reactive_selection_overlays
    status: active
    description: "Legal-move dots and capture rings on the chess board must NOT be rendered as Vue-reactive SVG children (<circle>, <path>, etc. in a reactive SVG component). They MUST use chessground's native drawable.shapes API via setShapes()."
    why: "A centralized queen has up to 27 legal moves. Rendering all selection indicators as Vue reactive SVG children triggers a full vDOM diff on every PIECE_SELECTED transition — up to 27 nodes created/destroyed per selection event. The GDD Tuning Knobs section is explicit: 'Selection overlays must use chessground's native drawable API, not Vue-reactive SVG children, to avoid a full vDOM diff on every selection change.' This is distinct from ADR-0006's annotation SVG overlay (which IS a Vue-reactive SVG sibling — for post-game arrows, not selection feedback)."
    adr: docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
    added: 2026-05-28

  - pattern: async_payload_assembler
    status: active
    description: "The exported symbol assembleExportPayload(game, config) in src/modules/game-export/assemble.ts MUST be a pure synchronous function. Its declaration MUST NOT carry the `async` keyword, and its return type MUST be `string` (NOT `Promise<string>`). It MUST contain no `await` expressions, no `fetch()`, no Supabase calls, no `sessionStorage` writes, no Promise-returning side effects. The same applies to any helper it calls in the assembly path."
    why: "iOS Safari 16+ consumes the user-activation window on the FIRST asynchronous boundary inside a tap handler. If the assembler awaits anything before `navigator.clipboard.writeText()` is called, the clipboard write rejects with NotAllowedError on iOS — silently, and only on iOS (desktop tests stay green). TypeScript's structural type system catches `async` drift via the `string`-not-`Promise<string>` return signature. Adding `async` changes the return type and breaks every caller that consumes it synchronously, surfacing the violation at compile time."
    adr: docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    added: 2026-05-28

  - pattern: clipboard_retry_after_share
    status: active
    description: "Once navigator.share() has been invoked inside a tap handler, the handler MUST NOT subsequently attempt navigator.clipboard.writeText() in the same handler — not on share rejection, not on share resolution, not on any condition. A non-AbortError share rejection routes to FALLBACK (the manual-copy textarea); an AbortError share rejection routes to IDLE; no path from SHARING leads back to COPYING at runtime. This is true on the mobile-first v0 contract regardless of platform."
    why: "iOS Safari 16+ spends the user-activation token on the `share()` call itself, before the native share sheet even opens. A subsequent `clipboard.writeText()` call in the same handler — even after the share rejection — fails with NotAllowedError because the activation is already consumed. The handler must commit to Tier 1 OR Tier 2 in one synchronous branch decision at the top of the gesture; fallback after a chosen-and-attempted tier is FALLBACK (Tier 3), never the other API tier. The SHARING → COPYING retry was tolerable only as a desktop convenience and is explicitly removed from the v0 contract to keep the mobile path safe."
    adr: docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    added: 2026-05-28

  - pattern: network_or_persistence_in_export_path
    status: active
    description: "The Game Export module (src/modules/game-export/**) MUST NOT call `fetch()`, the Supabase SDK, `localStorage.setItem()`, or `sessionStorage.setItem()` during the export tap path or assembler call. Static grep of the module directory must return zero matches for these tokens. Reads from Pinia stores are permitted (and required — gameStore.completedGame is the canonical input)."
    why: "GDD Core Rule 10: 'Export is a pure client-side string operation. It does not call Supabase, does not log what was exported, and does not store the PGN anywhere.' Beyond the GDD's design intent, any network or persistence call inside the assembler path introduces an async boundary that would break the iOS user-activation invariant (see async_payload_assembler pattern). The static-grep check is a defensible compile/CI gate that prevents accidental violation."
    adr: docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    added: 2026-05-28

  - pattern: direct_supabase_client_import
    status: active
    description: "Only `src/stores/auth.ts` and `src/stores/data-sync.ts` may import `supabase` from `src/lib/supabase.ts`. No other file may call `createClient()` or import the supabase singleton directly. Static grep: `grep -r 'createClient' src/ --include='*.ts'` must return zero matches outside of `src/lib/` and `src/stores/`."
    why: "Multiple Supabase client instances cause auth state desync — supabase-js caches session state internally per client instance. A rogue import that creates a second client would not share the session from useAuthStore, causing silent auth failures on guarded routes. Centralizing access through the two stores makes the RLS security boundary auditable and enforceable by static grep."
    adr: docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    added: 2026-05-30

  - pattern: service_role_key_in_client
    status: active
    description: "The Supabase service-role key (`SUPABASE_SERVICE_ROLE_KEY`) must NEVER appear in client-side environment variables (VITE_* prefix) or be bundled into the app. Only `VITE_SUPABASE_URL` and `VITE_SUPABASE_ANON_KEY` are permitted client-side. Static grep: `grep -r 'SERVICE_ROLE' src/` must return zero matches."
    why: "The service-role key bypasses all RLS policies — any client possessing it can read and write any row for any user. The anon key is public-safe by Supabase design (RLS enforces user isolation). Accidentally bundling the service-role key would expose full database access to any user who inspects the JavaScript bundle."
    adr: docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    added: 2026-05-30

