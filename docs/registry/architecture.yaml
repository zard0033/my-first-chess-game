# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: total-memory-ceiling
    status: active
    budget_ms: ""
    platform: Mobile    # iPhone Safari is the tightest constraint
    adr: docs/architecture/adr-0001-stockfish-build-versioning.md
    notes: "≤ 150 MB total resident memory including both engine workers and app overhead (Formula 4 in chess-engine-integration GDD). Play-only target: ~65 MB. Peak (Play + Review active): ~145 MB. NNUE RSS pending spike confirmation."
    referenced_by:
      - docs/architecture/adr-0001-stockfish-build-versioning.md
    added: 2026-05-28
    revised: ""

