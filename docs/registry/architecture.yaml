# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: play_engine_api
    status: active
    pattern: direct_call
    producer: chess-engine-integration
    consumers:
      - game-lifecycle      # calls play() when it is the AI's turn
      - difficulty-system   # passes skillLevel + movetimeMs through game-lifecycle
    adr: docs/architecture/adr-0001-stockfish-build-versioning.md
    signal_signature: "playEngine.play({ fen: string, skillLevel: 0–20, movetimeMs: number }) → Promise<PlayResult>"
    notes: "PlayResult fields: bestMove, kind?, evalCp?, evalMate?, depthReached, pv, ponder? (no emotive labels)"
    referenced_by:
      - docs/architecture/adr-0001-stockfish-build-versioning.md
    added: 2026-05-28
    revised: ""

  - contract: review_engine_api
    status: active
    pattern: direct_call
    producer: chess-engine-integration
    consumers:
      - post-game-review    # calls analyze() sequentially for each position in a completed game
    adr: docs/architecture/adr-0001-stockfish-build-versioning.md
    signal_signature: "reviewEngine.analyze({ fen: string, targetDepth?: number, movetimeMs?: number }, onProgress?: (p) => void) → Promise<ReviewResult>"
    notes: "ReviewResult fields: bestMove, evalCp?, evalMate?, depthReached, pv — no quality/label/classification fields"
    referenced_by:
      - docs/architecture/adr-0001-stockfish-build-versioning.md
    added: 2026-05-28
    revised: ""

  - contract: opening_index_api
    status: active
    pattern: direct_call
    producer: opening-identification
    consumers:
      - post-game-review    # calls identifyOpening(completedGame.moves) once on review screen mount
    adr: docs/architecture/adr-0003-chess-openings-dataset-pin-and-epd-index.md
    signal_signature: "identifyOpening(moves: string[]) → OpeningResult (sync); identifyPosition(fenOrEpd: string) → { eco, name } | null (sync)"
    notes: "OpeningResult fields: eco, name, matchedPly, bookExitPly, isUnknown, epd — no quality/recommendation/evaluative fields. Both functions are synchronous (Map.get — O(N) and O(1) respectively)."
    referenced_by:
      - docs/architecture/adr-0003-chess-openings-dataset-pin-and-epd-index.md
    added: 2026-05-28
    revised: ""

  - contract: game_store_api
    status: active
    pattern: direct_call
    producer: game-lifecycle
    consumers:
      - app-router           # reads isGameInProgress in beforeRouteLeave + popstate guard
      - post-game-review     # reads completedGame on mount
      - game-export          # reads completedGame to build PGN + Claude prompt
    adr: docs/architecture/adr-0005-pinia-store-boundaries-and-completed-game-transport.md
    signal_signature: "gameStore.isGameInProgress: boolean (reactive); gameStore.completedGame: CompletedGame | null (shallowRef, Object.freeze)"
    notes: "Canonical cross-module handoff channel. CompletedGame is immutable after assembly. isGameInProgress MUST be set false before any router.push('/review') call (disarm-before-navigate invariant)."
    referenced_by:
      - docs/architecture/adr-0005-pinia-store-boundaries-and-completed-game-transport.md
      - docs/architecture/adr-0004-vue-router-history-mode-and-github-pages-spa-fallback.md
    added: 2026-05-28
    revised: ""

  - contract: move_annotation_api
    status: active
    pattern: direct_call
    producer: move-annotation-display
    consumers:
      - post-game-review     # passes annotations[] + evaluation props; receives rendered SVG overlay
    adr: docs/architecture/adr-0006-move-annotation-rendering-substrate.md
    signal_signature: "props: { annotations: Annotation[], evaluation: { evalCp?, evalMate?, sideToMove } | null }"
    notes: "Declarative props only — no imperative 'add arrow' API. Consumer must NOT pre-flip evalCp/evalMate (component normalises to White's perspective internally). pointer-events: none; zero game-state side effects."
    referenced_by:
      - docs/architecture/adr-0006-move-annotation-rendering-substrate.md
    added: 2026-05-28
    revised: ""

  - contract: board_move_api
    status: active
    pattern: direct_call
    producer: chess-board
    consumers:
      - game-lifecycle     # listens for move-made to run the move through chess.js + trigger engine
      - chess-engine-integration  # may await animationDoneAt before announcing AI response
    adr: docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
    signal_signature: "emit('move-made', { from: Square, to: Square, promotion?: PromotionPiece, fen: string, animationDoneAt: Promise<void> })"
    notes: "Emitted at the logical commit point (after chess.js validation). For promotion moves, emitted only after the player makes an explicit selection — never on MOVING_PROMOTION. promotion is undefined (not null) for non-promotion moves. animationDoneAt resolves when slide + capture fade complete; consumers that need the visual to finish must await it."
    referenced_by:
      - docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
    added: 2026-05-28
    revised: ""

  - contract: board_geometry_api
    status: active
    pattern: direct_call
    producer: chess-board
    consumers:
      - move-annotation-display  # uses squareToRect() to position SVG arrows/highlights over board squares
    adr: docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
    signal_signature: "squareToRect(square: Square): { x: number; y: number; width: number; height: number } | null — board-local coordinates (relative to boardRef's top-left corner, orientation-corrected). Returns null for invalid squares."
    notes: "Board-local coordinate space: x=0, y=0 is boardRef's top-left pixel. SVG overlay (ADR-0006) is positioned at top:0, left:0 over boardRef, so squareToRect() values are used directly as SVG coordinates — no viewport conversion needed. Accessed via Vue template ref (defineExpose). Values are live (computed from offsetWidth each call); not cached."
    referenced_by:
      - docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
      - docs/architecture/adr-0006-move-annotation-rendering-substrate.md
    added: 2026-05-28
    revised: ""

  - contract: export_payload_assembler_api
    status: active
    pattern: direct_call
    producer: game-export
    consumers:
      - game-export        # consumed by its own composable + Vue component at tap time
      - game-history       # MVP — reuses the assembler for past-game export (no code duplication)
    adr: docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    signal_signature: "assembleExportPayload(game: CompletedGame, config: ExportConfig): string — PURE SYNC, no `async` keyword permitted; return type is `string` NOT `Promise<string>`"
    notes: "Structural enforcement of the iOS user-activation invariant. The string-return signature makes any future drift toward async I/O a TypeScript error. ExportConfig fields are all readonly. Same input → byte-identical output (deterministic). Adding `async` to this symbol's declaration is a forbidden pattern (see forbidden_patterns: async_payload_assembler)."
    referenced_by:
      - docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    added: 2026-05-28
    revised: ""

  - contract: game_export_control_api
    status: active
    pattern: direct_call
    producer: game-export
    consumers:
      - post-game-review   # mounts the AnalyzeWithClaude component; passes gameStore ref + config
    adr: docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    signal_signature: "useGameExport(game: Ref<CompletedGame | null>, config: ExportConfig) → { state: Ref<ExportState>, fallbackPayload: Ref<string | null>, oversizeWarning: Ref<boolean>, onAnalyzeTap(): void, dismissFallback(): void }"
    notes: "ExportState = 'IDLE' | 'SHARING' | 'COPYING' | 'SUCCESS' | 'FALLBACK'. State machine is owned by the composable (NOT Pinia) because export state is per-screen ephemeral and unmount-clean by Vue lifecycle. If Game History MVP ever needs cross-screen export-in-flight state, this composable model must be superseded (see ADR-0010 Decision §3 supersession trigger)."
    referenced_by:
      - docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    added: 2026-05-28
    revised: ""

  - contract: auth_store_api
    status: active
    pattern: direct_call
    producer: auth-system
    consumers:
      - app-router           # reads userId in beforeEach guard; null → redirect home
      - data-sync-system     # listens to onAuthStateChange SIGNED_IN to trigger flushUnsyncedQueue
    adr: docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    signal_signature: "useAuthStore.initAuth(): Promise<void>; useAuthStore.signIn(email: string): Promise<void>; useAuthStore.signOut(): Promise<void>; useAuthStore.userId: string | null (reactive); useAuthStore.isAuthLoading: boolean"
    notes: "No other store calls supabase.auth.* directly — all auth state flows through useAuthStore. initAuth() must be called on App.vue onMounted before any guarded route resolves."
    referenced_by:
      - docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    added: 2026-05-30
    revised: ""

  - contract: data_sync_api
    status: active
    pattern: direct_call
    producer: data-sync-system
    consumers:
      - post-game-review   # reads syncStatus for "Saved" / "Saving…" badge
      - skill-scoring      # calls syncSkillScore() after computing deltas
      - game-history       # calls loadGameHistory() to display past games
    adr: docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    signal_signature: "useDataSyncStore.syncGame(game: CompletedGame): Promise<void>; useDataSyncStore.syncSkillScore(score: SkillScoreInsert): Promise<void>; useDataSyncStore.loadGameHistory(): Promise<GameSession[]>; useDataSyncStore.flushUnsyncedQueue(): Promise<void>; useDataSyncStore.syncStatus: 'idle' | 'syncing' | 'synced' | 'error' (reactive)"
    notes: "Supabase is accessed exclusively through this store — no downstream system imports supabase client directly. syncGame() is called immediately on CompletedGame; PostGameReview does NOT await it before mounting."
    referenced_by:
      - docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    added: 2026-05-30
    revised: ""

  - contract: supabase_client_singleton
    status: active
    pattern: shared_resource
    producer: src/lib/supabase.ts
    consumers:
      - src/stores/auth.ts        # only permitted importer: useAuthStore
      - src/stores/data-sync.ts   # only permitted importer: useDataSyncStore
    adr: docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    signal_signature: "supabase: SupabaseClient — createClient(VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY)"
    notes: "One createClient() call per app lifetime. All other files that need Supabase must go through useAuthStore or useDataSyncStore interfaces — never import supabase directly."
    referenced_by:
      - docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    added: 2026-05-30
    revised: ""

