# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: chess_engine_wasm_source
    status: active
    api: "nmrugg/stockfish.js v18 — Stockfish 18 Lite single-threaded WASM (stockfish-18-lite-single), one build for Play+Review+Replay, NNUE embedded in ~7.3MB WASM (no external network file)"
    not: SF16 two-build HCE/NNUE split (superseded 2026-06-02, S10-06); 40MB external NNUE network; SharedArrayBuffer / multi-threaded builds (need COOP/COEP, unavailable on GitHub Pages)
    adr: docs/architecture/adr-0001-stockfish-build-versioning.md
    reason: "Single-threaded, no COOP/COEP → GitHub Pages + iOS Safari compatible. NNUE embedded (~7.3MB) avoids the 40MB external-network deployment that was never shipped under SF16. SF18 is always-NNUE (no `Use NNUE` UCI option). Migrated from SF16.1 lichess fork — see ADR-0001 amendment (2026-06-02)."
    referenced_by:
      - docs/architecture/adr-0001-stockfish-build-versioning.md
    added: 2026-05-28
    revised: "2026-06-02 (S10-06: SF16 → SF18 Lite single-threaded)"

  - purpose: chess_openings_dataset
    status: active
    api: chess-openings npm package (lichess organization), exact version pin (no ^ or ~ in package.json)
    not: Scid eco.epd; Jeroen Noomen ECO5; any non-npm database; runtime TSV fetch; JSON blob fetch
    adr: docs/architecture/adr-0003-chess-openings-dataset-pin-and-epd-index.md
    reason: "chess-openings is the approved package in the allowed libraries table. Exact pin protects display-copy AC strings from silent dataset updates. Build-time TypeScript Map is tree-shakeable, type-safe, and has zero runtime parsing cost."
    referenced_by:
      - docs/architecture/adr-0003-chess-openings-dataset-pin-and-epd-index.md
    added: 2026-05-28
    revised: ""

  - purpose: vue_router_history_mode
    status: active
    api: createWebHistory() (Vue Router 4 HTML5 history mode)
    not: createWebHashHistory(); createMemoryHistory(); any hash-based routing
    adr: docs/architecture/adr-0004-vue-router-history-mode-and-github-pages-spa-fallback.md
    reason: "HTML5 history mode produces clean URLs (no # fragment) required by the UX spec. Requires the GitHub Pages 404.html SPA fallback shim (established in ADR-0004). All future navigation decisions must stay within this routing model."
    referenced_by:
      - docs/architecture/adr-0004-vue-router-history-mode-and-github-pages-spa-fallback.md
    added: 2026-05-28
    revised: ""

  - purpose: csp_delivery_mechanism
    status: active
    api: "<meta http-equiv=\"Content-Security-Policy\"> tag in index.html"
    not: HTTP response headers; _headers file (Netlify-only); Service Worker header injection
    adr: docs/architecture/adr-0008-csp-headers-and-wasm-deployment-configuration.md
    reason: "GitHub Pages serves static files only — no custom HTTP headers. meta CSP is the only viable delivery mechanism for this deployment target. Changing deployment platform would require a superseding ADR."
    referenced_by:
      - docs/architecture/adr-0008-csp-headers-and-wasm-deployment-configuration.md
    added: 2026-05-28
    revised: ""

  - purpose: chess_board_keyboard_model
    status: active
    api: Single roving focus cell — one transparent <div tabindex="0"> repositioned to the focused square via useBoardKeyboard composable
    not: 64-cell div grid overlay; fork of vue3-chessboard/chessground; chessground native keyboard API (does not exist in 9.x)
    adr: docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
    reason: "O(1) DOM nodes vs O(64) for grid overlay; no library fork required; composable approach survives library updates. GDD specifies roving-tabindex as the required model — this implements it with minimal DOM footprint."
    referenced_by:
      - docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
    added: 2026-05-28
    revised: ""

  - purpose: chess_board_selection_overlays
    status: active
    api: chessground native drawable.shapes API for legal-move dots and capture rings
    not: Vue-reactive SVG children (explicitly banned by GDD Tuning Knobs); custom canvas overlay; CSS-only approach
    adr: docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
    reason: "GDD Tuning Knobs mandate: 'Selection overlays must use chessground's native drawable API, not Vue-reactive SVG children, to avoid a full vDOM diff on every selection change (up to 27 simultaneous dots for a centralized queen).' Vue-reactive alternative would cause O(n) vDOM diff on every PIECE_SELECTED transition."
    referenced_by:
      - docs/architecture/adr-0009-chess-board-substrate-vue3-chessboard-keyboard-model.md
    added: 2026-05-28
    revised: ""

  - purpose: clipboard_delivery_tier_model
    status: active
    api: "Three-tier delivery: (1) navigator.share({ text: payload }) when feature-detected AND canShare({ text: payload }) is true synchronously; else (2) navigator.clipboard.writeText(payload); else (3) <textarea v-if> with payload pre-selected for manual copy. Tier branch decided synchronously at top of tap handler before any await."
    not: SHARING → COPYING runtime fallthrough (forbidden on iOS — gesture already spent); always-clipboard model that drops Web Share; pre-built payload cache on mount; persistent hidden <textarea> for FALLBACK
    adr: docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    reason: "iOS Safari 16+ consumes the user-activation window on the first async API call. Synchronous tier decision means the handler commits to Tier 1 OR Tier 2 OR Tier 3 in one branch — never retries. canShare({ text: payload }) is probed with the EXACT shape that share() is then called with, closing a known iOS divergence footgun. GDD Core Rule 8 mandates this exact three-tier model."
    referenced_by:
      - docs/architecture/adr-0010-game-export-tier-delivery-and-sync-gesture-contract.md
    added: 2026-05-28
    revised: ""

  - purpose: auth_mechanism
    status: active
    api: Supabase Magic Link OTP (signInWithOtp({ email }))
    not: email/password (signInWithPassword); social OAuth (signInWithOAuth); anonymous auth; SMS OTP
    adr: docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    reason: "Magic Link is passwordless — no password to forget or reset, minimal login friction for a casual chess training app. GitHub Pages deployment rules out social OAuth (complex redirect URI setup). Email/password adds unnecessary password-reset support burden for v0."
    referenced_by:
      - docs/architecture/adr-0011-supabase-authentication-and-data-sync-strategy.md
    added: 2026-05-30
    revised: ""

# Example:
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # explicitly banned for this purpose
