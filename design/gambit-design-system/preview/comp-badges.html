<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .pill { display:inline-flex; align-items:center; gap:7px; font-family:var(--font-sans); font-weight:700;
          font-size:14px; border-radius:999px; padding:7px 15px; }
  .dot { width:7px; height:7px; border-radius:999px; }
</style>
</head>
<body>
<div class="row" style="align-items:center">
  <span class="pill" style="background:var(--primary);color:#fff"><span class="dot" style="background:#fff"></span>輪到你</span>
  <span class="pill" style="background:var(--surface-deep);color:var(--ink-on-deep-dim)">AI 思考中 <span style="letter-spacing:2px">●●●</span></span>
  <span class="pill" style="background:var(--surface-card);color:var(--ink-muted);border:1px solid var(--line);font-weight:500">覆盤 · 12 / 34</span>
  <span class="pill" style="background:var(--hint-light);color:var(--hint);font-size:12px;padding:5px 12px">最佳 Nbd2</span>
</div>
<p class="cap" style="margin:16px 0 0">Turn badge: jade solid pill ("輪到你"). AI thinking: deep-glass pill with 3-dot opacity stagger. Status pills stay quiet.</p>
</body>
</html>
