<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row">
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-card);border-color:var(--line)"><span class="sw-name" style="color:var(--ink)">ink 文字</span></div>
    <span class="sw-hex">#3D2210 · AAA</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-card);border-color:var(--line)"><span class="sw-name" style="color:var(--ink-muted)">muted</span></div>
    <span class="sw-hex">#7A5C44 · AA</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-card);border-color:var(--line)"><span class="sw-name" style="color:var(--ink-faint)">faint</span></div>
    <span class="sw-hex">#A88C76</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-deep)"><span class="sw-name" style="color:var(--ink-on-deep)">on-deep</span></div>
    <span class="sw-hex">#E7F1EC</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-deep)"><span class="sw-name" style="color:var(--ink-on-deep-dim)">on-deep-dim</span></div>
    <span class="sw-hex">#9BBDB1</span>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">Warm near-black ink on cream; light inks on the deep-jade anchor. faint never used for body.</p>
</body>
</html>
