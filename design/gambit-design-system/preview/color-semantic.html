<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row">
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--success)"><span class="sw-name" style="color:#fff">success</span></div>
    <span class="sw-hex">#4A7C59 · 沙綠</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--success-light)"><span class="sw-name" style="color:var(--success-dark)">light</span></div>
    <span class="sw-hex">#EEF4EE</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--danger)"><span class="sw-name" style="color:#fff">danger</span></div>
    <span class="sw-hex">#B8533A</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--danger-light)"><span class="sw-name" style="color:var(--danger-dark)">light</span></div>
    <span class="sw-hex">#F9EFE9</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--hint)"><span class="sw-name" style="color:#fff">hint</span></div>
    <span class="sw-hex">#C9872E</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--hint-light)"><span class="sw-name" style="color:var(--hint)">light</span></div>
    <span class="sw-hex">#FAF2E2</span>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">Success sage stays distinct from vivid jade primary. Danger is warm-red, not fire-red. Hint = gold family, own semantic.</p>
</body>
</html>
