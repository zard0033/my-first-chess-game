<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">

<style>
  table { border-collapse: collapse; width: 100%; }

  .tk { font-family: var(--font-num); font-size: 12px; color: var(--ink-muted); width: 90px; }

</style>

<body>
<table>
  <tr><td class="tk">display</td><td style="font-family:var(--font-serif);font-weight:700;font-size:22px">棋藝殿堂 Aa</td><td class="sp">44 / 1.15 · serif 700</td></tr>
  <tr><td class="tk">h1</td><td style="font-family:var(--font-serif);font-weight:700;font-size:19px">區塊主標 Aa</td><td class="sp">28 / 1.25 · serif 700</td></tr>

</html>
