<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .tabbar { display:flex; background:var(--surface-deep); border-radius:14px; padding:8px 8px 10px; gap:4px; max-width:420px; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 4px;
         border-radius:10px; font-family:var(--font-sans); font-size:11px; font-weight:500;
         color:var(--ink-on-deep-dim); position:relative; }
  .tab svg { width:22px; height:22px; }
  .tab.active { color:#fff; font-weight:700; background:var(--primary); }
  .tab.active::after { content:""; position:absolute; bottom:-2px; left:28%; right:28%; height:3px;
                       background:var(--accent); border-radius:999px; }
  .tab.hover { color:var(--ink-on-deep); background:rgba(255,255,255,.08); }
</style>
</head>
<body style="background:var(--surface-base)">
<nav class="tabbar">
  <div class="tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>首頁</div>
  <div class="tab hover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>學習</div>
  <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>對局</div>
  <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>我的</div>
</nav>
<p class="cap" style="margin:14px 0 0">Bottom tab on deep-jade. Active = solid jade pill + 3px gold indicator + weight 700. Hover = white/8. Lucide line icons.</p>
</body>
</html>
