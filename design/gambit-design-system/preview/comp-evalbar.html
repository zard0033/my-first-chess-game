<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div style="max-width:420px">
  <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
    <span style="font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--success)">白方稍優（+0.6）</span>
    <span style="font-family:var(--font-num);font-size:13px;color:var(--ink-muted)">最佳 Nbd2</span>
  </div>
  <div style="height:14px;border-radius:999px;overflow:hidden;display:flex;border:1px solid var(--line)">
    <div style="width:58%;background:var(--eval-white)"></div>
    <div style="width:3px;background:var(--accent)"></div>
    <div style="flex:1;background:var(--eval-black)"></div>
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:6px">
    <span style="font-family:var(--font-sans);font-size:12px;color:var(--ink-muted)">白優</span>
    <span style="font-family:var(--font-sans);font-size:12px;color:var(--ink-muted)">黑優</span>
  </div>
</div>
<p class="cap" style="margin:16px 0 0">Review-only <strong>wood eval bar</strong>: white-wood vs black-wood with a gold divider line. Verdict framed from player's side, never emotive.</p>
</body>
</html>
