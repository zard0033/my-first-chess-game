<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .btn { font-family: var(--font-sans); font-weight:700; font-size:15px; border:none; border-radius:var(--radius-btn);
         padding:11px 20px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
  .btn-jade { background:var(--primary); color:#fff; box-shadow:var(--shadow-button); }
  .btn-gold { background:linear-gradient(180deg,var(--accent-light),var(--accent)); color:var(--accent-ink);
              box-shadow:0 1px 2px rgba(61,34,16,.12), 0 0 14px rgba(248,181,0,.35); }
  .btn-ghost { background:transparent; color:var(--primary-dark); border:1.5px solid var(--line-strong); }
  .btn-hint { background:var(--hint-light); color:var(--hint); border:1.5px solid var(--hint-ring); }
  .btn[disabled]{ opacity:.45; cursor:not-allowed; }
</style>
</head>
<body>
<div class="row" style="align-items:center">
  <button class="btn btn-jade">開始對局 →</button>
  <button class="btn btn-gold">關鍵一手</button>
  <button class="btn btn-ghost">認輸</button>
  <button class="btn btn-hint">提示</button>
  <button class="btn btn-jade" disabled>即將推出</button>
</div>
<p class="cap" style="margin:16px 0 0">Jade primary · gold-gradient CTA (text = accent-ink) · ghost · hint · disabled (0.45). Press = scale shrink + jade→dark.</p>
</body>
</html>
