<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row" style="gap:22px;align-items:flex-end">
  <div class="col">
    <div style="width:120px;height:60px;background:var(--surface-card);border-radius:12px;box-shadow:var(--shadow-card)"></div>
    <span class="sw-hex">card</span>
  </div>
  <div class="col">
    <div style="width:120px;height:60px;background:var(--surface-card);border-radius:12px;box-shadow:var(--shadow-card-hover)"></div>
    <span class="sw-hex">card-hover</span>
  </div>
  <div class="col">
    <div style="width:120px;height:60px;background:var(--surface-card);border-radius:12px;box-shadow:var(--shadow-popover)"></div>
    <span class="sw-hex">popover / dialog</span>
  </div>
</div>
<p class="cap" style="margin:18px 0 0"><strong>Warm-brown</strong> soft shadows (rgba 61,34,16) — never pure black. Inside deep zones, lift with lightness, not shadow.</p>
</body>
</html>
