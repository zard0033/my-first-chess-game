<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .dur { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
  .bar { height:8px; background:var(--primary); border-radius:999px; }
  .ring-demo { width:48px; height:48px; border-radius:var(--radius-btn); background:var(--primary);
    outline:var(--focus-ring); outline-offset:var(--focus-ring-offset); }
</style>
</head>
<body>
<div class="row" style="align-items:flex-end;gap:20px">
  <div class="dur">
    <div class="bar" style="width:calc(150/350*100px)"></div>
    <span class="sw-hex">fast · 150ms</span>
  </div>
  <div class="dur">
    <div class="bar" style="width:calc(250/350*100px)"></div>
    <span class="sw-hex">base · 250ms</span>
  </div>
  <div class="dur">
    <div class="bar" style="width:100px"></div>
    <span class="sw-hex">slow · 350ms</span>
  </div>
  <div style="width:1px;background:var(--line);height:40px"></div>
  <div class="col" style="align-items:center;gap:8px">
    <div class="ring-demo"></div>
    <span class="sw-hex">focus-ring · 2px gold</span>
  </div>
  <div class="col" style="gap:4px">
    <span class="sw-hex" style="color:var(--ink-muted)">standard · ease(0.4,0,0.2,1)</span>
    <span class="sw-hex" style="color:var(--ink-muted)">decel   · ease(0,0,0.2,1)</span>
    <span class="sw-hex" style="color:var(--ink-muted)">accel   · ease(0.4,0,1,1)</span>
  </div>
</div>
<p class="cap" style="margin:16px 0 0">transform/opacity only — box-shadow animation forbidden (a11y). Fully respects <code>prefers-reduced-motion</code>.</p>
</body>
</html>
