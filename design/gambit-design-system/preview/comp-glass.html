<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body style="background:var(--surface-deep);background-image:radial-gradient(120% 100% at 80% -10%, #1a4b3f 0%, #103029 60%)">
<div style="background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
            border:var(--glass-border);box-shadow:var(--glass-sheen), 0 8px 24px rgba(0,0,0,.25);
            border-radius:var(--radius-lg);padding:18px 20px;max-width:380px">
  <div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-on-deep-dim);font-weight:500">晚安，Eason</div>
  <div style="font-family:var(--font-serif);font-size:22px;font-weight:700;color:var(--ink-on-deep);margin-top:4px">今天想下一盤嗎？</div>
</div>
<p class="cap" style="margin:16px 0 0;color:var(--ink-on-deep-dim)">Signature glass on jade: rgba(255,255,255,.07) · blur 10px · 1px white border · top sheen · soft outer shadow.</p>
