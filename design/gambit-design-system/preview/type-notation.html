<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div style="display:flex;gap:28px;align-items:center;font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1;font-family:var(--font-num)">
  <div>
    <div style="font-size:28px;font-weight:500;color:var(--ink)">12.c3</div>
    <p class="tile-label">move notation</p>
  </div>
  <div>
    <div style="font-size:28px;font-weight:500;color:var(--success)">+0.6</div>
    <p class="tile-label">eval (white)</p>
  </div>
  <div>
    <div style="font-size:28px;font-weight:500;color:var(--danger)">−1.4</div>
    <p class="tile-label">eval (black)</p>
  </div>
  <div>
    <div style="font-size:28px;font-weight:500;color:var(--ink)">1240</div>
    <p class="tile-label">rating 戰績</p>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">Notation / ratings / clocks use <strong>tabular figures</strong> so values never jitter as they update.</p>
</body>
</html>
