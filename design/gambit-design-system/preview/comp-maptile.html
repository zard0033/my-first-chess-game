<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
<style>
  .tile { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center;
          font-family:var(--font-num); font-weight:700; font-size:22px; color:#fff; position:relative; }
  .done { background:radial-gradient(120% 120% at 35% 25%, var(--map-top), var(--map-face) 55%, var(--map-socket)); }
  .current { background:radial-gradient(120% 120% at 35% 25%, var(--map-top), var(--map-face) 55%, var(--map-socket));
             box-shadow:var(--focus-gold); transform:scale(1.08); }
  .locked { background:radial-gradient(120% 120% at 35% 25%, var(--map-lock-top), var(--map-lock-face) 55%, var(--map-lock-socket)); color:var(--ink-faint); }
  svg { width:26px; height:26px; }
</style>
</head>
<body>
<div class="row" style="gap:34px;align-items:center;padding-left:8px">
  <div class="col" style="align-items:center">
    <div class="tile done"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <span class="tile-label">done</span>
  </div>
  <div class="col" style="align-items:center">
    <div class="tile current">3</div>
    <span class="tile-label">current</span>
  </div>
  <div class="col" style="align-items:center">
    <div class="tile locked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <span class="tile-label">locked</span>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">Quest-map nodes. Done = jade + ✓ SVG. Current = scaled + gold breathe ring (transform/opacity only). Locked = desaturated + lock SVG. Never emoji.</p>
</body>
</html>
