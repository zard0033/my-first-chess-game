<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row" style="align-items:flex-end">
  <div class="col">
    <div style="width:96px;height:64px;background:var(--surface-card);border:1px solid var(--line);border-radius:var(--radius-btn)"></div>
    <span class="sw-hex">btn · 8px</span>
  </div>
  <div class="col">
    <div style="width:96px;height:64px;background:var(--surface-card);border:1px solid var(--line);border-radius:var(--radius-card)"></div>
    <span class="sw-hex">card · 12px</span>
  </div>
  <div class="col">
    <div style="width:96px;height:64px;background:var(--surface-card);border:1px solid var(--line);border-radius:var(--radius-lg)"></div>
    <span class="sw-hex">lg-card · 16px</span>
  </div>
  <div class="col">
    <div style="width:120px;height:36px;background:var(--surface-card);border:1px solid var(--line);border-radius:var(--radius-pill)"></div>
    <span class="sw-hex">pill · 999px</span>
  </div>
</div>
<p class="cap" style="margin:16px 0 0">Corner radii. Pills for badges + nav active; cards 12–16px.</p>
</body>
</html>
