<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row" style="align-items:flex-start">
  <div style="flex:1.3">
    <div style="display:flex;gap:2px">
      <div style="flex:1;height:30px;background:var(--map-top);border-radius:8px 0 0 0"></div>
    </div>
    <div style="display:flex;gap:2px"><div style="flex:1;height:36px;background:var(--map-face)"></div></div>
    <div style="display:flex;gap:2px"><div style="flex:1;height:24px;background:var(--map-socket);border-radius:0 0 8px 8px"></div></div>
    <p class="tile-label">tile top · face · socket</p>
    <span class="sw-hex">#3AB894 / #167A5E / #0C5840</span>
  </div>
  <div style="flex:1.3">
    <div style="display:flex;gap:2px"><div style="flex:1;height:30px;background:var(--map-lock-top);border-radius:8px 0 0 0"></div></div>
    <div style="display:flex;gap:2px"><div style="flex:1;height:36px;background:var(--map-lock-face)"></div></div>
    <div style="display:flex;gap:2px"><div style="flex:1;height:24px;background:var(--map-lock-socket);border-radius:0 0 8px 8px"></div></div>
    <p class="tile-label">locked (desaturated)</p>
    <span class="sw-hex">#EBE2D2 / #D8CDB9 / #B5A790</span>
  </div>
  <div style="flex:1">
    <div class="swatch" style="background:var(--map-trail);min-height:44px"><span class="sw-name" style="color:var(--accent-ink)">trail</span></div>
    <div class="swatch" style="background:var(--map-trail-base);min-height:30px;margin-top:6px"><span class="sw-name" style="color:var(--ink-muted)">trail base</span></div>
    <span class="sw-hex">#F8B500 / #D4C5A2</span>
  </div>
</div>
<p class="cap" style="margin:12px 0 0">Three-step lightness = 3D depth. Face deepened to #167A5E — white text <strong>4.7:1 ✓</strong> (was 3.2:1). Locked tiles desaturate.</p>
</body>
</html>
