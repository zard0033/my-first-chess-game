<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row" style="gap:14px">
  <!-- plain cream card -->
  <div style="flex:1;background:var(--surface-card);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:16px">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--accent-dark)">NEW GAME</div>
    <div style="font-family:var(--font-serif);font-size:20px;font-weight:700;color:var(--ink);margin-top:6px">開始新對局</div>
    <div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-muted);margin-top:4px">對手 Lv.4 · 自選強度與執子</div>
  </div>
  <!-- continue-learning accent card (jade left rule) -->
  <div style="flex:1;background:var(--surface-card);border:1px solid var(--line);border-left:4px solid var(--primary);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:16px">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--primary-dark)">第一章 · 基礎規則</div>
    <div style="font-family:var(--font-serif);font-size:20px;font-weight:700;color:var(--ink);margin-top:6px">城堡與主教</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
      <div style="flex:1;height:6px;background:var(--line-subtle);border-radius:999px;overflow:hidden"><div style="width:37%;height:100%;background:var(--primary)"></div></div>
      <span style="font-family:var(--font-num);font-size:12px;color:var(--ink-muted);font-variant-numeric:tabular-nums">3/8</span>
    </div>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">Cream card (radius 16, warm soft shadow, hairline border). The "continue" card adds a single jade left-accent rule + progress.</p>
</body>
</html>
