<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row">
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--anno-key)"><span class="sw-name" style="color:var(--accent-ink)">keySquare</span></div>
    <span class="sw-hex">山吹 #F8B500</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--anno-played)"><span class="sw-name" style="color:#fff">played</span></div>
    <span class="sw-hex">利休鼠 #888E7E</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--anno-alt)"><span class="sw-name" style="color:#fff">alt line</span></div>
    <span class="sw-hex">淺蔥 #33A6B8</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--anno-threat)"><span class="sw-name" style="color:var(--accent-ink)">threat</span></div>
    <span class="sw-hex">紅鬱金 #E08E79</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--eval-white)"><span class="sw-name" style="color:var(--accent-ink)">eval 白</span></div>
    <span class="sw-hex">#C2A37C</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--eval-black)"><span class="sw-name" style="color:#fff">eval 黑</span></div>
    <span class="sw-hex">#4E3F36</span>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">Japanese-traditional board/annotation palette — <strong>owned upstream, do not restyle</strong>. Listed for alignment only.</p>
</body>
</html>
