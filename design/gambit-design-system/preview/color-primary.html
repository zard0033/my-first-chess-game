<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row">
  <div class="col" style="flex:1.4">
    <div class="swatch" style="background:var(--primary)"><span class="sw-name" style="color:#fff">primary</span></div>
    <span class="sw-hex">#1C7059 · 青瓷 jade</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--primary-dark)"><span class="sw-name" style="color:#fff">dark</span></div>
    <span class="sw-hex">#155747</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--primary-soft)"><span class="sw-name" style="color:var(--primary-dark)">soft</span></div>
    <span class="sw-hex">#CFE9E0</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--primary-fg);border-color:var(--line)"><span class="sw-name" style="color:var(--ink-muted)">fg</span></div>
    <span class="sw-hex">#FFFFFF</span>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">Buttons · links · focus · progress. White text ≥ 4.5:1. Hover → dark.</p>
</body>
</html>
