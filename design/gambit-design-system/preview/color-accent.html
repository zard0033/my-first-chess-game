<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row">
  <div class="col" style="flex:1.2">
    <div class="swatch" style="background:var(--accent)"><span class="sw-name" style="color:var(--accent-ink)">accent</span></div>
    <span class="sw-hex">#F8B500 · 山吹 gold</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--accent-light)"><span class="sw-name" style="color:var(--accent-ink)">light</span></div>
    <span class="sw-hex">#FFC94D</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--accent-dark)"><span class="sw-name" style="color:#fff">dark · 文字</span></div>
    <span class="sw-hex">#8F6200</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--accent-ink)"><span class="sw-name" style="color:var(--accent)">ink</span></div>
    <span class="sw-hex">#3A2408</span>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">The ONE brand gold — fills/indicators only. Never body text (≈1.6:1 on cream). Gold text = dark, large only.</p>
</body>
</html>
