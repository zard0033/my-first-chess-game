<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div style="display:flex;gap:0;align-items:flex-end">
  <div class="col" style="align-items:center"><div style="width:4px;height:24px;background:var(--primary)"></div><span class="sw-hex" style="margin-top:4px">4</span></div>
  <div style="width:8px"></div>
  <div class="col" style="align-items:center"><div style="width:8px;height:32px;background:var(--primary)"></div><span class="sw-hex" style="margin-top:4px">8</span></div>
  <div style="width:12px"></div>
  <div class="col" style="align-items:center"><div style="width:16px;height:44px;background:var(--primary)"></div><span class="sw-hex" style="margin-top:4px">16</span></div>
  <div style="width:16px"></div>
  <div class="col" style="align-items:center"><div style="width:24px;height:56px;background:var(--primary)"></div><span class="sw-hex" style="margin-top:4px">24</span></div>
  <div style="width:24px"></div>
  <div class="col" style="align-items:center"><div style="width:32px;height:72px;background:var(--primary)"></div><span class="sw-hex" style="margin-top:4px">32</span></div>
  <div style="width:32px"></div>
  <div class="col" style="align-items:center"><div style="width:48px;height:92px;background:var(--primary)"></div><span class="sw-hex" style="margin-top:4px">48</span></div>
</div>
<p class="cap" style="margin:16px 0 0">4 / 8px base rhythm; section steps 16 / 24 / 32 / 48. Touch targets ≥ 44×44px.</p>
</body>
</html>
