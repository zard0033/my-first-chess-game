<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="preview.css">
</head>
<body>
<div class="row">
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-base)"><span class="sw-name" style="color:var(--ink-muted)">base</span></div>
    <span class="sw-hex">#FAF6F0</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-card)"><span class="sw-name" style="color:var(--ink-muted)">card</span></div>
    <span class="sw-hex">#FCF9F3</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-raised)"><span class="sw-name" style="color:var(--ink-muted)">raised</span></div>
    <span class="sw-hex">#F4EAD8</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-mid)"><span class="sw-name" style="color:var(--ink-muted)">mid</span></div>
    <span class="sw-hex">#DDD0B8</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-hover)"><span class="sw-name" style="color:var(--ink-muted)">hover</span></div>
    <span class="sw-hex">#EFE4D2</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-deep)"><span class="sw-name" style="color:var(--ink-on-deep)">deep</span></div>
    <span class="sw-hex">#103029</span>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:var(--surface-deep-2)"><span class="sw-name" style="color:var(--ink-on-deep)">deep-2</span></div>
    <span class="sw-hex">#18443A</span>
  </div>
</div>
<p class="cap" style="margin:14px 0 0">Warm cream content surfaces + deep-jade anchor. <strong>surface-mid</strong> (#DDD0B8) added for modal scrims &amp; section dividers.</p>
</body>
</html>
